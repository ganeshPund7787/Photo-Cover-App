name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # JOB 1: Lint & Type Check
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

  # JOB 2: Build & Push Docker Image
  docker:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ganeshpund/project2
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL }}
            KINDE_ISSUER_URL=https://placeholder.kinde.com
            KINDE_CLIENT_ID=placeholder_client_id
            KINDE_CLIENT_SECRET=placeholder_client_secret
            KINDE_SITE_URL=http://localhost:3000
            KINDE_POST_LOGOUT_REDIRECT_URL=http://localhost:3000
            KINDE_POST_LOGIN_REDIRECT_URL=http://localhost:3000/auth-callback
            STRIPE_SECREATE_KEY=sk_placeholder_key_for_build
            STRIPE_WEBHOOK_SECRET=whsec_placeholder_for_build
            DATABASE_URL=postgresql://placeholder:placeholder@placeholder:5432/placeholder
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # JOB 3: Deploy to Vercel
  # deploy:
  #   name: 🚀 Deploy to Vercel
  #   runs-on: ubuntu-latest
  #   needs: [lint, docker]
  #   if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4

  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: "20"

  #     - name: Install Vercel CLI
  #       run: npm install -g vercel

  #     - name: Pull Vercel Environment
  #       run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

  #     - name: Build Project via Vercel
  #       run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

  #     - name: Deploy to Vercel Production
  #       run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # JOB 4: Notify
  notify:
    name: ✅ Pipeline Complete
    runs-on: ubuntu-latest
    needs: [lint, docker, deploy]
    if: always()

    steps:
      - name: Pipeline Status
        run: |
          echo "========================================="
          echo "  CI/CD Pipeline Finished"
          echo "  Lint:   ${{ needs.lint.result }}"
          echo "  Docker: ${{ needs.docker.result }}"
          echo "  Deploy: ${{ needs.deploy.result }}"
          echo "========================================="
